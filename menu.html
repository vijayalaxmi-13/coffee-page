    <section id="feedback">
        <form action="">
            <label for="name">Name:</label>
            <input type="text" name="name" id="name">
            <br><br>
            <label for="rating">Rating:</label>
            <select name="rating" id="rating">
                <option value="">Excellence</option>
                <option value="">Good</option>
                <option value="">Average</option>
                <option value="">Bad</option>
            </select>
            <br><br>

            <label for="comment">Comments</label>
            <br>
            <textarea name="comment" id="comment" placeholder="please comment!"
            rows="10" cols="30"></textarea>
        </form>
    </section>

    <hr>

    <fieldset>
        <legend>What items did you like?</legend>
        <input type="checkbox" name="item" id="espresso">
        <label for="espresso">Espresso</label>
        <br>

        <input type="checkbox" name="item" id="cappuccino">
        <label for="cappuccino">Cappuccino</label>
        <br>

        <input type="checkbox" name="item" id="latte">
        <label for="latte">Lattee</label>
        <br>

        <input type="checkbox" name="item" id="cold coffee">
        <label for="cold coffee">Cold Coffee</label>
